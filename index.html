    // Global functions for inventory buttons
    window.adjustStock = function(itemId, amount) {
        const item = db.menuItems.find(i => i.id === itemId);
        if (!item) return;
        if (item.stock === undefined) item.stock = 0;
        const newStock = Math.max(0, item.stock + amount);
        item.stock = newStock;
        if (newStock <= 0) {
            item.available = false;
        } else if (newStock > 0 && !item.available) {
            item.available = true;
        }
        saveDatabase();
        renderInventory();
        renderMenuItemsGrid();
        if (document.getElementById("dashboardView").classList.contains("active")) {
            renderDashboard();
        }
        showNotification(`📦 ${item.name} stock: ${newStock}`);
    };

    window.adjustStockFromInput = function(itemId) {
        const input = document.getElementById(`stock-input-${itemId}`);
        if (!input) return;
        const value = parseInt(input.value);
        if (isNaN(value) || value < 0) {
            alert("Please enter a valid number");
            return;
        }
        const item = db.menuItems.find(i => i.id === itemId);
        if (!item) return;
        item.stock = value;
        if (value <= 0) {
            item.available = false;
        } else if (value > 0 && !item.available) {
            item.available = true;
        }
        saveDatabase();
        renderInventory();
        renderMenuItemsGrid();
        if (document.getElementById("dashboardView").classList.contains("active")) {
            renderDashboard();
        }
        showNotification(`📦 ${item.name} stock set to: ${value}`);
    };

    window.resetStock = function(itemId) {
        const item = db.menuItems.find(i => i.id === itemId);
        if (!item) return;
        const defaultStock = item.defaultStock || 10;
        item.stock = defaultStock;
        if (defaultStock > 0 && !item.available) {
            item.available = true;
        }
        saveDatabase();
        renderInventory();
        renderMenuItemsGrid();
        if (document.getElementById("dashboardView").classList.contains("active")) {
            renderDashboard();
        }
        showNotification(`🔄 ${item.name} stock reset to: ${defaultStock}`);
    };

    function addMenuItem() {
        const nameInput = document.getElementById("newMenuName");
        const priceInput = document.getElementById("newMenuPrice");
        const stockInput = document.getElementById("newMenuStock");
        if (!nameInput || !priceInput || !stockInput) return;
        const name = nameInput.value.trim();
        const price = parseFloat(priceInput.value);
        const stock = parseInt(stockInput.value) || 10;
        if (!name || isNaN(price) || price <= 0) return alert("Valid name & price");
        db.menuItems.push({ 
            id: nextMenuId++, 
            name, 
            price, 
            available: true, 
            useTimeLimit: false, 
            timeStart: "00:00", 
            timeEnd: "23:59",
            stock: stock,
            defaultStock: stock
        });
        saveDatabase();
        renderMenuManagement();
        nameInput.value = "";
        priceInput.value = "";
        stockInput.value = "10";
        showNotification(`✅ ${name} added with ${stock} stock!`);
    }
    
    function editMenuItem(id) {
        const item = db.menuItems.find(i => i.id === id);
        if (!item) return;
        const newName = prompt("Edit name:", item.name);
        if (newName) item.name = newName.trim();
        const newPrice = parseFloat(prompt("Edit price:", item.price));
        if (!isNaN(newPrice) && newPrice > 0) item.price = newPrice;
        const newStock = parseInt(prompt("Edit stock:", item.stock !== undefined ? item.stock : 10));
        if (!isNaN(newStock) && newStock >= 0) {
            item.stock = newStock;
            if (newStock <= 0) item.available = false;
            else if (newStock > 0 && !item.available) item.available = true;
        }
        saveDatabase(); 
        renderMenuManagement();
        showNotification(`✅ ${item.name} updated!`);
    }
    
    function deleteMenuItem(id) {
        if (confirm("Remove this item?")) { 
            db.menuItems = db.menuItems.filter(i => i.id !== id); 
            saveDatabase(); 
            renderMenuManagement();
            showNotification("🗑️ Item removed");
        }
    }

    function openAddCustomerModal() {
        const nameInput = document.getElementById("customerName");
        const phoneInput = document.getElementById("customerPhone");
        if (nameInput) nameInput.value = "";
        if (phoneInput) phoneInput.value = "";
        const modal = document.getElementById("customerModal");
        if (modal) modal.classList.add("active");
    }
    
    function saveCustomerFromModal() {
        const nameInput = document.getElementById("customerName");
        const phoneInput = document.getElementById("customerPhone");
        const name = nameInput ? nameInput.value.trim() : "";
        const phone = phoneInput ? phoneInput.value.trim() : "";
        if (!name || !phone) { alert("Name and phone required"); return; }
        db.customers.push({ id: "c" + Date.now() + "_" + Math.random().toString(36).substr(2, 6), name, phone, createdAt: Date.now() });
        saveDatabase();
        renderGuests();
        const modal = document.getElementById("customerModal");
        if (modal) modal.classList.remove("active");
        alert(`Customer "${name}" added!`);
    }

    function requestDeletePassword(customerId) {
        pendingDeleteCustomerId = customerId;
        const passInput = document.getElementById("deletePassInput");
        if (passInput) passInput.value = "";
        const modal = document.getElementById("deletePasswordModal");
        if (modal) modal.classList.add("active");
    }
    
    function confirmDeleteWithPassword() {
        const passInput = document.getElementById("deletePassInput");
        const pwd = passInput ? passInput.value : "";
        if (pwd !== DELETE_PASSWORD) { 
            alert("Wrong admin password!"); 
            const modal = document.getElementById("deletePasswordModal");
            if (modal) modal.classList.remove("active");
            return; 
        }
        if (pendingDeleteCustomerId) {
            const customerOrders = db.orders.filter(o => o.customerId === pendingDeleteCustomerId);
            // Return stock for customer orders before deleting
            customerOrders.forEach(order => {
                if (!db.cancelledOrders.includes(order.id)) {
                    returnStockForOrder(order.id);
                }
            });
            db.orders = db.orders.filter(o => o.customerId !== pendingDeleteCustomerId);
            db.customers = db.customers.filter(c => c.id !== pendingDeleteCustomerId);
            saveDatabase();
            renderGuests();
            alert("Customer and all their orders deleted.");
        }
        const modal = document.getElementById("deletePasswordModal");
        if (modal) modal.classList.remove("active");
        pendingDeleteCustomerId = null;
    }
    
    function cancelDelete() { 
        const modal = document.getElementById("deletePasswordModal");
        if (modal) modal.classList.remove("active"); 
        pendingDeleteCustomerId = null; 
    }

    function requestPassword(viewName) {
        activeProtectedView = viewName;
        const passInput = document.getElementById("adminPassInput");
        if (passInput) passInput.value = "";
        const modal = document.getElementById("passwordModal");
        if (modal) modal.classList.add("active");
    }
    
    function verifyPassword() {
        const passInput = document.getElementById("adminPassInput");
        const pwd = passInput ? passInput.value : "";
        if (pwd === ADMIN_PASSWORD) {
            const modal = document.getElementById("passwordModal");
            if (modal) modal.classList.remove("active");
            if (activeProtectedView === "dashboard") { 
                renderDashboard(); 
                document.getElementById("dashboardView").classList.add("active"); 
                document.getElementById("ordersView").classList.remove("active"); 
                document.getElementById("menuView").classList.remove("active"); 
                updateNavActive("dashboardViewBtn"); 
                startDashboardAutoRefresh();
            }
            else if (activeProtectedView === "menu") { 
                renderMenuManagement(); 
                document.getElementById("menuView").classList.add("active"); 
                document.getElementById("ordersView").classList.remove("active"); 
                document.getElementById("dashboardView").classList.remove("active"); 
                updateNavActive("menuViewBtn"); 
                stopDashboardAutoRefresh();
            }
        } else { alert("Wrong admin password!"); }
        activeProtectedView = null;
    }
    
    function updateNavActive(activeId) { 
        document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.remove("active")); 
        const activeBtn = document.getElementById(activeId);
        if (activeBtn) activeBtn.classList.add("active");
    }
    
    function cancelPassword() { 
        const modal = document.getElementById("passwordModal");
        if (modal) modal.classList.remove("active"); 
        activeProtectedView = null; 
    }

    function initNavigation() {
        const ordersBtn = document.getElementById("ordersViewBtn");
        const dashboardBtn = document.getElementById("dashboardViewBtn");
        const menuBtn = document.getElementById("menuViewBtn");
        
        if (ordersBtn) ordersBtn.onclick = () => {
            document.getElementById("ordersView").classList.add("active");
            document.getElementById("dashboardView").classList.remove("active");
            document.getElementById("menuView").classList.remove("active");
            updateNavActive("ordersViewBtn");
            renderGuests();
            stopDashboardAutoRefresh();
        };
        if (dashboardBtn) dashboardBtn.onclick = () => requestPassword("dashboard");
        if (menuBtn) menuBtn.onclick = () => requestPassword("menu");
    }

    function bindEvents() {
        const addCustomerBtn = document.getElementById("addCustomerBtn");
        if (addCustomerBtn) addCustomerBtn.onclick = openAddCustomerModal;
        
        const closeOrderBtn = document.getElementById("closeOrderModalBtn");
        if (closeOrderBtn) closeOrderBtn.onclick = closeOrderModal;
        
        const saveOrderBtn = document.getElementById("saveOrderBtn");
        if (saveOrderBtn) saveOrderBtn.onclick = saveModalOrder;
        
        const clearCartBtn = document.getElementById("clearCartBtn");
        if (clearCartBtn) clearCartBtn.onclick = () => { currentModalCart = []; updateModalCartUI(); renderModalMenu(); };
        
        const closeCustomerModalBtn = document.getElementById("closeCustomerModalBtn");
        if (closeCustomerModalBtn) closeCustomerModalBtn.onclick = () => {
            const modal = document.getElementById("customerModal");
            if (modal) modal.classList.remove("active");
        };
        
        const saveCustomerBtn = document.getElementById("saveCustomerModalBtn");
        if (saveCustomerBtn) saveCustomerBtn.onclick = saveCustomerFromModal;
        
        const submitPasswordBtn = document.getElementById("submitPasswordBtn");
        if (submitPasswordBtn) submitPasswordBtn.onclick = verifyPassword;
        
        const cancelPasswordBtn = document.getElementById("cancelPasswordBtn");
        if (cancelPasswordBtn) cancelPasswordBtn.onclick = cancelPassword;
        
        const confirmDeleteBtn = document.getElementById("confirmDeleteBtn");
        if (confirmDeleteBtn) confirmDeleteBtn.onclick = confirmDeleteWithPassword;
        
        const cancelDeleteBtn = document.getElementById("cancelDeleteBtn");
        if (cancelDeleteBtn) cancelDeleteBtn.onclick = cancelDelete;
        
        // Cancel order password modal events
        const confirmCancelOrderBtn = document.getElementById("confirmCancelOrderBtn");
        if (confirmCancelOrderBtn) confirmCancelOrderBtn.onclick = confirmCancelOrder;
        
        const cancelOrderPasswordCancelBtn = document.getElementById("cancelOrderPasswordCancelBtn");
        if (cancelOrderPasswordCancelBtn) cancelOrderPasswordCancelBtn.onclick = cancelOrderPasswordCancel;
        
        const closePopupBtn = document.getElementById("closePopupBtn");
        if (closePopupBtn) closePopupBtn.onclick = closeCustomerPopup;
        
        const customerPopup = document.getElementById("customerPopup");
        if (customerPopup) customerPopup.addEventListener("click", (e) => { if (e.target === customerPopup) closeCustomerPopup(); });
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }

    async function init() {
        loadDatabase();
        renderGuests();
        bindEvents();
        initNavigation();
        scheduleMidnightReset();
        setupVisibilityCheck();
        setupPeriodicCheck();
        await initFirebase();
        
        if (document.getElementById("dashboardView").classList.contains("active")) {
            startDashboardAutoRefresh();
        }
    }
    init();
</script>
</body>
</html>
