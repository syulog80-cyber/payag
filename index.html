<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Maison Orders · Popup Customer Panel | Order History Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif;
        }

        body {
            background: #f1efe7;
            padding: 2rem;
            min-height: 100vh;
        }

        .app-wrapper {
            max-width: 800px;
            margin: 0 auto;
            background: #f9f7f2;
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .main-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #e8e0d3;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .main-header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #2c241a;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            background: #ede3d6;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: #5a3e2b;
        }

        .nav-btn.active {
            background: #e67e22;
            color: white;
        }

        .password-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1100;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .password-modal.active {
            visibility: visible;
            opacity: 1;
        }

        .password-box {
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        .password-box input {
            width: 100%;
            padding: 0.8rem;
            margin: 1rem 0;
            border: 1px solid #e0cfbc;
            border-radius: 60px;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        /* Dashboard Styles */
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            padding: 1.5rem;
        }

        .stat-card {
            background: white;
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            border-left: 4px solid #e67e22;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #e67e22;
        }

        .summary-table, .history-table {
            background: white;
            border-radius: 1rem;
            margin: 1rem;
            overflow-x: auto;
            padding: 1rem;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #3a2a1f;
            padding-left: 0.5rem;
            border-left: 4px solid #e67e22;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 0.6rem;
            text-align: left;
            border-bottom: 1px solid #f0e0ce;
        }

        th {
            background: #fcf5ea;
            color: #a55117;
            font-weight: 600;
        }

        /* Menu Management Styles */
        .menu-management-panel {
            padding: 1.5rem;
        }

        .add-menu-form {
            background: white;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: flex-end;
        }

        .form-group {
            flex: 1;
            min-width: 120px;
        }

        .form-group label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #b4926a;
            display: block;
        }

        .form-group input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #e0cfbc;
            border-radius: 30px;
            margin-top: 4px;
        }

        .menu-items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .menu-card {
            background: white;
            border-radius: 1rem;
            padding: 0.8rem;
            text-align: center;
            border: 1px solid #f0deca;
        }

        .menu-card.unavailable {
            opacity: 0.6;
            background: #f5f0ea;
        }

        .time-settings {
            margin: 8px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            font-size: 0.7rem;
        }

        .time-settings input {
            width: 70px;
            padding: 3px;
            border: 1px solid #e0cfbc;
            border-radius: 20px;
            text-align: center;
        }

        .availability-check {
            margin: 6px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.7rem;
        }

        .menu-actions {
            margin-top: 8px;
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .btn-icon {
            background: #ede3d6;
            border: none;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .btn-primary {
            background: #e67e22;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
        }

        /* Guests Sidebar */
        .guests-sidebar {
            background: #ffffff;
            border-right: 1px solid #ede6db;
            padding: 1.5rem 0;
             width: 300px;
        }

        .guests-list {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            max-height: 550px;
            overflow-y: auto;
        }

        .guest-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.7rem 1.2rem;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: 0.1s;
        }

        .guest-item:hover {
            background: #fef7ef;
        }

        .guest-name {
            font-weight: 500;
        }

        .guest-phone {
            font-size: 0.7rem;
            color: #b28b65;
            margin-top: 2px;
        }

        .order-count-badge {
            font-size: 0.7rem;
            background: #ede3d6;
            padding: 0.2rem 0.5rem;
            border-radius: 30px;
        }

        /* Popup Modal for Customer Panel */
        .popup-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .popup-modal.active {
            visibility: visible;
            opacity: 1;
        }

        .popup-content {
            background: #fefcf8;
            border-radius: 1.5rem;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: popupSlide 0.2s ease-out;
        }

        @keyframes popupSlide {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .popup-header {
            background: #e67e22;
            color: white;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 1.5rem 1.5rem 0 0;
        }

        .popup-header h3 {
            font-size: 1.3rem;
        }

        .close-popup {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: white;
        }

        .popup-body {
            padding: 1.5rem;
        }

        .customer-info-popup {
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid #eee5db;
        }

        .customer-info-popup h2 {
            font-size: 1.4rem;
            color: #2c241a;
        }

        .customer-info-popup p {
            color: #b28b65;
            margin-top: 4px;
        }

        .order-card {
            background: white;
            border-radius: 1rem;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
            border: 1px solid #efe2d4;
        }

        .order-date {
            font-size: 0.7rem;
            color: #b4926a;
            margin-bottom: 6px;
        }

        .order-item-line {
            font-size: 0.85rem;
            padding: 2px 0;
        }

        .order-total {
            text-align: right;
            font-weight: 600;
            margin-top: 6px;
            padding-top: 4px;
            border-top: 1px dashed #f0e2d4;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #b28b65;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #e0cfbc;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            cursor: pointer;
        }

        .btn-danger {
            background: transparent;
            border: 1px solid #e0cfbc;
            color: #c0392b;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            cursor: pointer;
        }

        /* Order Modal inside popup */
        .inner-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2100;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .inner-modal.active {
            visibility: visible;
            opacity: 1;
        }

        .inner-modal-content {
            background: white;
            border-radius: 1.5rem;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.2rem;
        }

        .menu-grid-modal {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 0.8rem;
            margin: 1rem 0;
        }

        .menu-item-card {
            background: #fef6ec;
            border-radius: 1rem;
            padding: 0.7rem;
            text-align: center;
            border: 1px solid #f0deca;
        }

        .menu-item-card.unavailable-modal {
            opacity: 0.5;
            background: #f0ece6;
        }

        .qty-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }

        .qty-btn {
            background: #e67e22;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
        }

        .cart-summary {
            background: #f7ede2;
            border-radius: 1rem;
            padding: 0.8rem;
            margin: 0.8rem 0;
        }

        .cart-item-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px dashed #e0cbb4;
            font-size: 0.85rem;
        }

        @media (max-width: 700px) {
            body { padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="main-header">
        <h1>Payag Food App</h1>
        <div class="nav-buttons">
            <button id="ordersViewBtn" class="nav-btn active">Orders</button>
            <button id="dashboardViewBtn" class="nav-btn">Dashboard</button>
            <button id="menuViewBtn" class="nav-btn">Menu</button>
        </div>
    </div>

    <!-- Customers View (only sidebar) -->
    <div id="ordersView" class="view active">
        <div class="guests-sidebar">
            <div style="padding: 0 1.2rem 0.5rem; color:#b28b65; font-size:0.7rem;">CUSTOMERS</div>
            <div id="guestsListContainer" class="guests-list"></div>
            <div style="padding: 1rem 1.2rem;">
                <button id="addCustomerBtn" class="btn-outline" style="width:100%;">+ Add Customer</button>
            </div>
        </div>
    </div>

    <div id="dashboardView" class="view">
        <div id="dashboardContent" style="padding:1rem;"></div>
    </div>

    <div id="menuView" class="view">
        <div id="menuManagementContent" class="menu-management-panel"></div>
    </div>
</div>

<!-- Password Modal -->
<div id="passwordModal" class="password-modal">
    <div class="password-box">
        <h3>Admin Access</h3>
        <input type="password" id="adminPassInput" placeholder="Password">
        <div style="display:flex; gap:1rem; justify-content:center;">
            <button id="cancelPasswordBtn" class="btn-outline">Cancel</button>
            <button id="submitPasswordBtn" class="btn-primary">Unlock</button>
        </div>
    </div>
</div>

<!-- Delete Password Modal -->
<div id="deletePasswordModal" class="password-modal">
    <div class="password-box">
        <h3>Confirm Delete Customer</h3>
        <input type="password" id="deletePassInput" placeholder="Password">
        <div style="display:flex; gap:1rem; justify-content:center;">
            <button id="cancelDeleteBtn" class="btn-outline">Cancel</button>
            <button id="confirmDeleteBtn" class="btn-danger">Delete</button>
        </div>
    </div>
</div>

<!-- Customer Popup Modal -->
<div id="customerPopup" class="popup-modal">
    <div class="popup-content">
        <div class="popup-header">
            <h3>Customer Details</h3>
            <button class="close-popup" id="closePopupBtn">&times;</button>
        </div>
        <div class="popup-body" id="popupBody">
            <!-- Dynamic content -->
        </div>
    </div>
</div>

<!-- Order Modal (inner) -->
<div id="orderModal" class="inner-modal">
    <div class="inner-modal-content">
        <h3>New order for <span id="modalCustomerName">Guest</span></h3>
        <div id="modalMenuGrid" class="menu-grid-modal"></div>
        <div class="cart-summary">
            <div style="display:flex; justify-content:space-between;">
                <strong>Current Order</strong>
                <button id="clearCartBtn" style="background:none; border:none; color:#c0392b; cursor:pointer;">Clear</button>
            </div>
            <div id="modalCartItems" style="min-height:50px;"></div>
            <div style="text-align:right; font-weight:bold; margin-top:8px;" id="modalTotal">PHP 0.00</div>
        </div>
        <div style="display:flex; gap:1rem; justify-content:flex-end; margin-top:1rem;">
            <button id="closeOrderModalBtn" class="btn-outline">Cancel</button>
            <button id="saveOrderBtn" class="btn-primary">Save Order</button>
        </div>
    </div>
</div>

<!-- Add Customer Modal -->
<div id="customerModal" class="password-modal">
    <div class="password-box">
        <h3>Add Customer</h3>
        <input type="text" id="customerName" placeholder="Full Name" style="width:100%; margin:0.5rem 0; padding:0.5rem;">
        <input type="text" id="customerPhone" placeholder="Phone" style="width:100%; margin:0.5rem 0; padding:0.5rem;">
        <div style="display:flex; gap:1rem; justify-content:center; margin-top:1rem;">
            <button id="closeCustomerModalBtn" class="btn-outline">Cancel</button>
            <button id="saveCustomerModalBtn" class="btn-primary">Save</button>
        </div>
    </div>
</div>

<script>
    // ========== DATABASE ==========
    let db = {
        customers: [],
        menuItems: [],
        orders: [],
        lastResetDate: null
    };
    
    let nextMenuId = 1;
    let currentModalCart = [];
    let currentModalCustomerId = null;
    let currentPopupCustomerId = null;

    const ADMIN_PASSWORD = "admin123";
    let activeProtectedView = null;
    let pendingDeleteCustomerId = null;
    const CURRENCY = "PHP ";

    // Daily reset
    function checkAndResetDailyOrders() {
        const today = new Date().toDateString();
        const lastReset = db.lastResetDate ? new Date(db.lastResetDate).toDateString() : null;
        if (lastReset !== today) {
            db.orders = [];
            db.lastResetDate = new Date().toISOString();
            saveDatabase();
            return true;
        }
        return false;
    }

    function loadDatabase() {
        const stored = localStorage.getItem("maison_db_v10");
        if (stored) {
            try {
                const data = JSON.parse(stored);
                db = data;
                if (!db.customers) db.customers = [];
                if (!db.menuItems) db.menuItems = [];
                if (!db.orders) db.orders = [];
                if (!db.lastResetDate) db.lastResetDate = null;
            } catch(e) { initDefaultData(); }
        } else {
            initDefaultData();
        }
        checkAndResetDailyOrders();
        if (db.menuItems.length) {
            nextMenuId = Math.max(...db.menuItems.map(i => i.id)) + 1;
        } else { nextMenuId = 1; }
        db.menuItems.forEach(item => {
            if (item.timeStart === undefined) item.timeStart = "00:00";
            if (item.timeEnd === undefined) item.timeEnd = "23:59";
            if (item.useTimeLimit === undefined) item.useTimeLimit = false;
        });
        saveDatabase();
    }

    function initDefaultData() {
        db.customers = [
            { id: "c1", name: "bryxz", phone: "555-0142", createdAt: Date.now() },
            { id: "c2", name: "Amelia Chen", phone: "555-0142", createdAt: Date.now() - 86400000 }
        ];
        db.menuItems = [
            { id: 1, name: "Monggos", price: 40, available: true, useTimeLimit: true, timeStart: "11:00", timeEnd: "21:00" },
            { id: 2, name: "Pancit", price: 40, available: true, useTimeLimit: false, timeStart: "00:00", timeEnd: "23:59" },
            { id: 3, name: "Lumpia", price: 40, available: true, useTimeLimit: false, timeStart: "00:00", timeEnd: "23:59" },
            { id: 4, name: "Fried Chicken", price: 50, available: true, useTimeLimit: true, timeStart: "13:00", timeEnd: "20:00" },
            { id: 5, name: "Guso", price: 30, available: true, useTimeLimit: true, timeStart: "17:00", timeEnd: "22:00" },
            { id: 6, name: "Pinirito", price: 50, available: true, useTimeLimit: false, timeStart: "00:00", timeEnd: "23:59" }
        ];
        db.orders = [];
        db.lastResetDate = new Date().toISOString();
        saveDatabase();
    }

    function saveDatabase() {
        localStorage.setItem("maison_db_v10", JSON.stringify(db));
    }

    function isItemAvailableNow(item) {
        if (!item.available) return false;
        if (!item.useTimeLimit) return true;
        const now = new Date();
        const currentTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        return currentTime >= (item.timeStart || "00:00") && currentTime <= (item.timeEnd || "23:59");
    }

    function getCustomerById(id) { return db.customers.find(c => c.id === id); }
    function getOrdersByCustomer(custId) { return db.orders.filter(o => o.customerId === custId).sort((a, b) => b.timestamp - a.timestamp); }

    // Render Guests Sidebar
    function renderGuests() {
        const container = document.getElementById("guestsListContainer");
        container.innerHTML = "";
        if (db.customers.length === 0) {
            container.innerHTML = "<div style='padding:1rem; text-align:center; color:#b28b65;'>No customers.<br>Click + Add Customer</div>";
            return;
        }
        db.customers.forEach(cust => {
            const orderCount = db.orders.filter(o => o.customerId === cust.id).length;
            const div = document.createElement("div");
            div.className = "guest-item";
            div.innerHTML = `<div><div class="guest-name">${escapeHtml(cust.name)}</div><div class="guest-phone">${escapeHtml(cust.phone)}</div></div><span class="order-count-badge">${orderCount}</span>`;
            div.onclick = () => openCustomerPopup(cust.id);
            container.appendChild(div);
        });
    }

    // Open Popup for Customer
    function openCustomerPopup(customerId) {
        currentPopupCustomerId = customerId;
        const cust = getCustomerById(customerId);
        if (!cust) return;
        const custOrders = getOrdersByCustomer(customerId);
        
        let ordersHtml = "";
        if (custOrders.length === 0) {
            ordersHtml = '<div class="empty-state">No orders yet today. Orders reset daily at midnight.</div>';
        } else {
            custOrders.forEach(order => {
                let itemsHtml = "";
                order.items.forEach(item => { itemsHtml += `<div class="order-item-line">${item.quantity}x ${item.name}</div>`; });
                ordersHtml += `<div class="order-card"><div class="order-date">${order.date}</div><div class="order-items">${itemsHtml}</div><div class="order-total">Total ${CURRENCY}${order.total.toFixed(2)}</div></div>`;
            });
        }
        
        document.getElementById("popupBody").innerHTML = `
            <div class="customer-info-popup">
                <h2>${escapeHtml(cust.name)}</h2>
                <p>${escapeHtml(cust.phone)} · ${custOrders.length} order(s) today</p>
            </div>
            <button id="popupNewOrderBtn" class="btn-primary" style="width:100%; margin-bottom:1rem;">+ New Order</button>
            <div style="font-weight:600; margin-bottom:0.5rem;">Today's Orders</div>
            <div id="popupOrdersContainer">${ordersHtml}</div>
            <div style="margin-top:1rem; text-align:center;">
                <button id="popupDeleteCustomerBtn" class="btn-danger">Delete Customer</button>
            </div>
        `;
        
        document.getElementById("popupNewOrderBtn").onclick = () => {
            closeCustomerPopup();
            openOrderModalForCustomer(customerId);
        };
        document.getElementById("popupDeleteCustomerBtn").onclick = () => {
            closeCustomerPopup();
            requestDeletePassword(customerId);
        };
        
        document.getElementById("customerPopup").classList.add("active");
    }

    function closeCustomerPopup() {
        document.getElementById("customerPopup").classList.remove("active");
        currentPopupCustomerId = null;
    }

    // Order Modal Functions
    function openOrderModalForCustomer(customerId) {
        const cust = getCustomerById(customerId);
        if (!cust) return;
        currentModalCustomerId = customerId;
        currentModalCart = [];
        document.getElementById("modalCustomerName").innerText = cust.name;
        renderModalMenu();
        updateModalCartUI();
        document.getElementById("orderModal").classList.add("active");
    }

    function renderModalMenu() {
        const grid = document.getElementById("modalMenuGrid");
        grid.innerHTML = "";
        db.menuItems.forEach(item => {
            const isAvailable = isItemAvailableNow(item);
            const cartItem = currentModalCart.find(c => c.id === item.id);
            const qty = cartItem ? cartItem.quantity : 0;
            const div = document.createElement("div");
            div.className = `menu-item-card ${!isAvailable ? 'unavailable-modal' : ''}`;
            let timeInfo = "";
            if (item.useTimeLimit && !isAvailable && item.available) {
                timeInfo = `<div style="font-size:0.65rem; color:#e67e22;">Available ${item.timeStart}-${item.timeEnd}</div>`;
            } else if (!item.available) {
                timeInfo = `<div style="font-size:0.65rem; color:#c0392b;">Unavailable</div>`;
            }
            div.innerHTML = `
                <div><strong>${escapeHtml(item.name)}</strong></div>
                <div>${CURRENCY}${item.price.toFixed(2)}</div>
                <div class="qty-control">
                    <button class="qty-btn minus" data-id="${item.id}" ${!isAvailable ? 'disabled' : ''}>-</button>
                    <span id="modalQty-${item.id}">${qty}</span>
                    <button class="qty-btn plus" data-id="${item.id}" ${!isAvailable ? 'disabled' : ''}>+</button>
                </div>
                ${timeInfo}
            `;
            if (isAvailable) {
                div.querySelector('.minus').onclick = (e) => { e.stopPropagation(); updateModalItemQuantity(item.id, -1); };
                div.querySelector('.plus').onclick = (e) => { e.stopPropagation(); updateModalItemQuantity(item.id, 1); };
            }
            grid.appendChild(div);
        });
    }

    function updateModalItemQuantity(itemId, delta) {
        const menuItem = db.menuItems.find(i => i.id === itemId);
        if (!menuItem || !isItemAvailableNow(menuItem)) return;
        const existingIndex = currentModalCart.findIndex(c => c.id === itemId);
        const currentQty = existingIndex !== -1 ? currentModalCart[existingIndex].quantity : 0;
        const newQty = currentQty + delta;
        if (newQty <= 0) {
            if (existingIndex !== -1) currentModalCart.splice(existingIndex, 1);
        } else {
            if (existingIndex !== -1) currentModalCart[existingIndex].quantity = newQty;
            else currentModalCart.push({ id: menuItem.id, name: menuItem.name, price: menuItem.price, quantity: newQty });
        }
        const qtySpan = document.getElementById(`modalQty-${itemId}`);
        if (qtySpan) qtySpan.innerText = newQty > 0 ? newQty : 0;
        updateModalCartUI();
    }

    function updateModalCartUI() {
        const container = document.getElementById("modalCartItems");
        const totalSpan = document.getElementById("modalTotal");
        if (currentModalCart.length === 0) {
            container.innerHTML = "<div style='color:#b87a4a; text-align:center;'>No items added. Use +/- to order.</div>";
            totalSpan.innerText = `${CURRENCY}0.00`;
            return;
        }
        let html = "", total = 0;
        currentModalCart.forEach(item => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            html += `<div class="cart-item-row"><span>${item.name}</span><span>x${item.quantity}</span><span>${CURRENCY}${itemTotal.toFixed(2)}</span></div>`;
        });
        container.innerHTML = html;
        totalSpan.innerText = `${CURRENCY}${total.toFixed(2)}`;
    }

    function saveModalOrder() {
        if (!currentModalCustomerId || currentModalCart.length === 0) { alert("No items ordered."); return; }
        const now = new Date();
        const formattedDate = `${now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })} · ${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
        const total = currentModalCart.reduce((s, i) => s + (i.price * i.quantity), 0);
        db.orders.push({
            id: "ord_" + Date.now(),
            customerId: currentModalCustomerId,
            date: formattedDate,
            timestamp: Date.now(),
            items: currentModalCart.map(i => ({ name: i.name, price: i.price, quantity: i.quantity })),
            total: parseFloat(total.toFixed(2))
        });
        saveDatabase();
        closeOrderModal();
        renderGuests();
        alert(`Order saved! Total: ${CURRENCY}${total.toFixed(2)}`);
    }

    function closeOrderModal() {
        document.getElementById("orderModal").classList.remove("active");
        currentModalCart = [];
    }

    // Dashboard with Customer Order History
    function renderDashboard() {
        const container = document.getElementById("dashboardContent");
        const menuTotals = new Map();
        db.orders.forEach(order => {
            order.items.forEach(item => {
                const existing = menuTotals.get(item.name) || { quantity: 0, revenue: 0 };
                existing.quantity += item.quantity;
                existing.revenue += item.price * item.quantity;
                menuTotals.set(item.name, existing);
            });
        });
        const totalOrders = db.orders.length;
        const totalRevenue = db.orders.reduce((s, o) => s + o.total, 0);
        const uniqueCust = new Set(db.orders.map(o => o.customerId)).size;
        
        let menuSummaryHtml = "";
        if (menuTotals.size === 0) menuSummaryHtml = `<tr><td colspan="3">No orders today</td></tr>`;
        else for (let [name, data] of menuTotals.entries()) menuSummaryHtml += `<tr><td>${escapeHtml(name)}</td><td>${data.quantity}</td><td>${CURRENCY}${data.revenue.toFixed(2)}</td></tr>`;
        
        // Customer order history
        const customersWithOrders = new Map();
        db.orders.forEach(order => {
            const cust = getCustomerById(order.customerId);
            const customerName = cust ? cust.name : "Unknown";
            if (!customersWithOrders.has(order.customerId)) {
                customersWithOrders.set(order.customerId, { name: customerName, phone: cust ? cust.phone : "", orders: [] });
            }
            customersWithOrders.get(order.customerId).orders.push(order);
        });
        
        let customerHistoryHtml = "";
        const sortedCustomers = Array.from(customersWithOrders.values()).sort((a, b) => a.name.localeCompare(b.name));
        if (sortedCustomers.length === 0) {
            customerHistoryHtml = '<div class="empty-state">No orders placed today.</div>';
        } else {
            sortedCustomers.forEach(customer => {
                const sortedOrders = customer.orders.sort((a, b) => b.timestamp - a.timestamp);
                let orderRows = "";
                sortedOrders.forEach(order => {
                    let itemsText = order.items.map(i => `${i.quantity}x ${i.name}`).join(", ");
                    orderRows += `<tr><td style="white-space: nowrap;">${order.date}</td><td>${itemsText}</td><td style="text-align: right;">${CURRENCY}${order.total.toFixed(2)}</td></tr>`;
                });
                customerHistoryHtml += `
                    <div style="margin-bottom:1rem; border:1px solid #efe2d4; border-radius:1rem; overflow:hidden;">
                        <div style="background:#fcf5ea; padding:0.5rem 1rem; font-weight:600;">${escapeHtml(customer.name)} · ${customer.phone} · ${customer.orders.length} order(s)</div>
                        <table style="width:100%; font-size:0.8rem;"><tbody>${orderRows}</tbody></table>
                    </div>
                `;
            });
        }
        
        container.innerHTML = `
            <div class="dashboard-stats">
                <div class="stat-card"><div class="stat-number">${totalOrders}</div><div>Today's Orders</div></div>
                <div class="stat-card"><div class="stat-number">${CURRENCY}${totalRevenue.toFixed(2)}</div><div>Revenue</div></div>
                <div class="stat-card"><div class="stat-number">${uniqueCust}</div><div>Customers</div></div>
            </div>
            <div class="summary-table"><div class="section-title">Menu Summary</div><table><thead><tr><th>Item</th><th>Qty</th><th>Revenue</th></tr></thead><tbody>${menuSummaryHtml}</tbody></table></div>
            <div class="history-table"><div class="section-title">Customer Order History</div>${customerHistoryHtml}<div style="font-size:0.7rem; color:#b28b65; text-align:center; margin-top:1rem;">Orders reset daily at midnight</div></div>
        `;
    }

    // Menu Management (simplified)
    function renderMenuManagement() {
        const container = document.getElementById("menuManagementContent");
        let html = `<div class="add-menu-form"><div class="form-group"><label>Dish name</label><input type="text" id="newMenuName"></div><div class="form-group"><label>Price</label><input type="number" id="newMenuPrice" step="0.01"></div><button id="addMenuSubmitBtn" class="btn-primary">+ Add</button></div><div class="menu-items-grid" id="menuItemsGrid"></div>`;
        container.innerHTML = html;
        const grid = document.getElementById("menuItemsGrid");
        grid.innerHTML = "";
        db.menuItems.forEach(item => {
            const isAvailNow = isItemAvailableNow(item);
            const card = document.createElement("div");
            card.className = `menu-card ${!item.available || !isAvailNow ? 'unavailable' : ''}`;
            card.innerHTML = `<div><strong>${escapeHtml(item.name)}</strong></div><div>${CURRENCY}${item.price.toFixed(2)}</div>
                <div class="availability-check"><input type="checkbox" class="avail-checkbox" data-id="${item.id}" ${item.available ? 'checked' : ''}><span>Available</span></div>
                <div class="time-settings"><input type="checkbox" class="time-limit-checkbox" data-id="${item.id}" ${item.useTimeLimit ? 'checked' : ''}><span>Time limit</span>
                <input type="time" class="time-start" data-id="${item.id}" value="${item.timeStart}" ${!item.useTimeLimit ? 'disabled' : ''}>
                <span>to</span><input type="time" class="time-end" data-id="${item.id}" value="${item.timeEnd}" ${!item.useTimeLimit ? 'disabled' : ''}></div>
                <div class="menu-actions"><button class="btn-icon edit-menu" data-id="${item.id}">Edit</button><button class="btn-icon delete-menu" data-id="${item.id}">Delete</button></div>`;
            card.querySelector('.avail-checkbox').onclick = () => { item.available = !item.available; saveDatabase(); renderMenuManagement(); };
            const limitCheck = card.querySelector('.time-limit-checkbox');
            limitCheck.onclick = () => { item.useTimeLimit = !item.useTimeLimit; saveDatabase(); renderMenuManagement(); };
            card.querySelector('.time-start').onchange = (e) => { item.timeStart = e.target.value; saveDatabase(); };
            card.querySelector('.time-end').onchange = (e) => { item.timeEnd = e.target.value; saveDatabase(); };
            card.querySelector(".edit-menu").onclick = () => editMenuItem(item.id);
            card.querySelector(".delete-menu").onclick = () => deleteMenuItem(item.id);
            grid.appendChild(card);
        });
        document.getElementById("addMenuSubmitBtn").onclick = addMenuItem;
    }

    function addMenuItem() {
        const name = document.getElementById("newMenuName").value.trim();
        const price = parseFloat(document.getElementById("newMenuPrice").value);
        if (!name || isNaN(price) || price <= 0) return alert("Valid name & price");
        db.menuItems.push({ id: nextMenuId++, name, price, available: true, useTimeLimit: false, timeStart: "00:00", timeEnd: "23:59" });
        saveDatabase();
        renderMenuManagement();
        document.getElementById("newMenuName").value = ""; document.getElementById("newMenuPrice").value = "";
    }
    function editMenuItem(id) {
        const item = db.menuItems.find(i => i.id === id);
        if (!item) return;
        const newName = prompt("Edit name:", item.name);
        if (newName) item.name = newName.trim();
        const newPrice = parseFloat(prompt("Edit price:", item.price));
        if (!isNaN(newPrice) && newPrice > 0) item.price = newPrice;
        saveDatabase(); renderMenuManagement();
    }
    function deleteMenuItem(id) {
        if (confirm("Remove this item?")) { db.menuItems = db.menuItems.filter(i => i.id !== id); saveDatabase(); renderMenuManagement(); }
    }

    // Customer CRUD
    function openAddCustomerModal() {
        document.getElementById("customerName").value = "";
        document.getElementById("customerPhone").value = "";
        document.getElementById("customerModal").classList.add("active");
    }
    function saveCustomerFromModal() {
        const name = document.getElementById("customerName").value.trim();
        const phone = document.getElementById("customerPhone").value.trim();
        if (!name || !phone) { alert("Name and phone required"); return; }
        db.customers.push({ id: "c" + Date.now() + "_" + Math.random().toString(36).substr(2, 6), name, phone, createdAt: Date.now() });
        saveDatabase();
        renderGuests();
        document.getElementById("customerModal").classList.remove("active");
        alert(`Customer "${name}" added!`);
    }

    function requestDeletePassword(customerId) {
        pendingDeleteCustomerId = customerId;
        document.getElementById("deletePassInput").value = "";
        document.getElementById("deletePasswordModal").classList.add("active");
    }
    function confirmDeleteWithPassword() {
        const pwd = document.getElementById("deletePassInput").value;
        if (pwd !== ADMIN_PASSWORD) { alert("Wrong password!"); document.getElementById("deletePasswordModal").classList.remove("active"); return; }
        if (pendingDeleteCustomerId) {
            db.orders = db.orders.filter(o => o.customerId !== pendingDeleteCustomerId);
            db.customers = db.customers.filter(c => c.id !== pendingDeleteCustomerId);
            saveDatabase();
            renderGuests();
            alert("Customer deleted.");
        }
        document.getElementById("deletePasswordModal").classList.remove("active");
        pendingDeleteCustomerId = null;
    }
    function cancelDelete() { document.getElementById("deletePasswordModal").classList.remove("active"); pendingDeleteCustomerId = null; }

    // Password for Dashboard & Menu
    function requestPassword(viewName) {
        activeProtectedView = viewName;
        document.getElementById("adminPassInput").value = "";
        document.getElementById("passwordModal").classList.add("active");
    }
    function verifyPassword() {
        const pwd = document.getElementById("adminPassInput").value;
        if (pwd === ADMIN_PASSWORD) {
            document.getElementById("passwordModal").classList.remove("active");
            if (activeProtectedView === "dashboard") { renderDashboard(); document.getElementById("dashboardView").classList.add("active"); document.getElementById("ordersView").classList.remove("active"); document.getElementById("menuView").classList.remove("active"); updateNavActive("dashboardViewBtn"); }
            else if (activeProtectedView === "menu") { renderMenuManagement(); document.getElementById("menuView").classList.add("active"); document.getElementById("ordersView").classList.remove("active"); document.getElementById("dashboardView").classList.remove("active"); updateNavActive("menuViewBtn"); }
        } else { alert("Wrong password!"); }
        activeProtectedView = null;
    }
    function updateNavActive(activeId) { document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.remove("active")); document.getElementById(activeId).classList.add("active"); }
    function cancelPassword() { document.getElementById("passwordModal").classList.remove("active"); activeProtectedView = null; }

    function initNavigation() {
        document.getElementById("ordersViewBtn").onclick = () => {
            document.getElementById("ordersView").classList.add("active");
            document.getElementById("dashboardView").classList.remove("active");
            document.getElementById("menuView").classList.remove("active");
            updateNavActive("ordersViewBtn");
            renderGuests();
        };
        document.getElementById("dashboardViewBtn").onclick = () => requestPassword("dashboard");
        document.getElementById("menuViewBtn").onclick = () => requestPassword("menu");
    }

    function bindEvents() {
        document.getElementById("addCustomerBtn").onclick = openAddCustomerModal;
        document.getElementById("closeOrderModalBtn").onclick = closeOrderModal;
        document.getElementById("saveOrderBtn").onclick = saveModalOrder;
        document.getElementById("clearCartBtn").onclick = () => { currentModalCart = []; updateModalCartUI(); renderModalMenu(); };
        document.getElementById("closeCustomerModalBtn").onclick = () => document.getElementById("customerModal").classList.remove("active");
        document.getElementById("saveCustomerModalBtn").onclick = saveCustomerFromModal;
        document.getElementById("submitPasswordBtn").onclick = verifyPassword;
        document.getElementById("cancelPasswordBtn").onclick = cancelPassword;
        document.getElementById("confirmDeleteBtn").onclick = confirmDeleteWithPassword;
        document.getElementById("cancelDeleteBtn").onclick = cancelDelete;
        document.getElementById("closePopupBtn").onclick = closeCustomerPopup;
        document.getElementById("customerPopup").addEventListener("click", (e) => { if (e.target === document.getElementById("customerPopup")) closeCustomerPopup(); });
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }

    function init() {
        loadDatabase();
        renderGuests();
        bindEvents();
        initNavigation();
    }
    init();
</script>
</body>
</html>
